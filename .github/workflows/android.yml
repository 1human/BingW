name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 安装 Android SDK 组件并自动接受许可协议
        uses: android-actions/setup-android@v3

      - name: 安装 Android SDK 37.1 平台
        run: sdkmanager "platforms;android-37.1" "build-tools;35.0.0"

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 编译 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: BingWallpaper-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
